<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FSO Admin Dashboard | FoSCoS Grievance Portal</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="logo">F</span>
        <span>FSO Admin Dashboard</span>
      </div>
      <nav>
        <a href="/consumer/index.html">Consumer Site</a>
        <a href="/fbo/dashboard.html">FBO View</a>
      </nav>
    </header>

    <main class="container">
      <h1 class="page-title">All Complaints</h1>
      <p class="subtitle">
        Investigate complaints and take regulatory action on Food Business
        Operators.
      </p>

      <div class="flex" style="margin-bottom: 10px">
        <button class="btn secondary small" data-filter="all">All</button>
        <button class="btn secondary small" data-filter="Pending">
          Pending
        </button>
        <button class="btn secondary small" data-filter="Under Review">
          Under Review
        </button>
        <button class="btn secondary small" data-filter="Action Taken">
          Action Taken
        </button>
      </div>

      <div id="complaintsList"></div>

      <h1 class="page-title" style="margin-top: 30px">
        Registered Food Businesses
      </h1>

      <table class="table">
        <thead>
          <tr>
            <th>License #</th>
            <th>Name</th>
            <th>Location</th>
            <th>Complaints</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="fboTable"></tbody>
      </table>

      <section id="fboDetail" class="hidden" style="margin-top: 20px">
        <h3 style="color: var(--green-dark)" id="fboDetailTitle"></h3>
        <div id="fboDetailComplaints"></div>
        <button id="closeFboDetail" class="btn secondary small">Close</button>
      </section>
    </main>

    <script src="/static/script.js"></script>
    <script>
      const ALL_COMPLAINTS = [
        {
          id: "C001",
          restaurant: "Green Leaf Restaurant",
          license: "10012345000123",
          rating: 2.0,
          complaint: "Stale vegetables in salad.",
          consumer_name: "Rahul Sharma",
          consumer_phone: "+91-9876543210",
          status: "Under Review",
        },
        {
          id: "C003",
          restaurant: "Tandoor House",
          license: "10012345000789",
          rating: 1.6,
          complaint: "Dirty kitchen visible from window.",
          consumer_name: "Anita Verma",
          consumer_phone: "+91-9988776655",
          status: "Pending",
        },
        {
          id: "C005",
          restaurant: "South Express",
          license: "10012345001122",
          rating: 2.6,
          complaint: "Staff not wearing gloves.",
          consumer_name: "Karthik R.",
          consumer_phone: "+91-9090909090",
          status: "Pending",
        },
        {
          id: "C002",
          restaurant: "Spice Junction",
          license: "10012345000456",
          rating: 4.3,
          complaint: "Great hygiene, small billing issue.",
          consumer_name: "Meera Iyer",
          consumer_phone: "+91-9001122334",
          status: "Action Taken",
        },
      ];

      const FBOS = [
        { license: "10012345000123", name: "Green Leaf Restaurant", location: "Bengaluru" },
        { license: "10012345000456", name: "Spice Junction", location: "Kolkata" },
        { license: "10012345000789", name: "Tandoor House", location: "New Delhi" },
        { license: "10012345000991", name: "Coastal Catch", location: "Mumbai" },
        { license: "10012345001122", name: "South Express", location: "Chennai" },
      ];

      function complaintCard(c) {
        return `
          <div class="card" data-id="${c.id}">
            <div class="card-row">
              <div>
                <h3>${c.restaurant}</h3>
                <div class="meta">License: ${c.license}</div>
                <div class="meta">Complaint ID: ${c.id}</div>
              </div>
              <div style="text-align:right">
                <div class="rating-badge">${c.rating.toFixed(1)} / 5</div>
                <div style="margin-top:6px">${statusChip(c.status)}</div>
              </div>
            </div>
            <p style="margin: 10px 0">${c.complaint}</p>
            <div class="muted" style="font-size: 13px">
              <strong>Consumer:</strong> ${c.consumer_name}
              &middot; ${c.consumer_phone}
            </div>
            <div class="flex" style="margin-top: 10px; flex-wrap: wrap">
              <button class="btn small warning" data-action="warning">
                Issue Warning
              </button>
              <button class="btn small" data-action="inspection">
                Assign Inspection
              </button>
              <button class="btn small secondary" data-action="resolve">
                Mark Resolved
              </button>
            </div>
            <div class="action-slot"></div>
          </div>`;
      }

      const listEl = qs("#complaintsList");
      function renderComplaints(filter = "all") {
        const data =
          filter === "all"
            ? ALL_COMPLAINTS
            : ALL_COMPLAINTS.filter((c) => c.status === filter);
        if (!data.length) {
          listEl.innerHTML =
            '<div class="card"><p class="muted">No complaints for this filter.</p></div>';
          return;
        }
        listEl.innerHTML = data.map(complaintCard).join("");
      }
      renderComplaints();

      qsa("[data-filter]").forEach((b) => {
        b.addEventListener("click", () => renderComplaints(b.dataset.filter));
      });

      listEl.addEventListener("click", (e) => {
        const card = e.target.closest(".card");
        if (!card) return;
        const action = e.target.dataset.action;
        if (!action) return;

        const slot = card.querySelector(".action-slot");
        const id = card.dataset.id;
        const msg = {
          warning: `⚠️ Warning issued for complaint ${id}`,
          inspection: `🔍 Inspection assigned for complaint ${id}`,
          resolve: `✓ Complaint ${id} marked resolved`,
        }[action];
        slot.innerHTML = `<p class="muted" style="margin-top:8px">${msg}</p>`;
      });

      // FBO table
      function complaintsForLicense(license) {
        return ALL_COMPLAINTS.filter((c) => c.license === license);
      }

      const tableEl = qs("#fboTable");
      tableEl.innerHTML = FBOS.map(
        (f) => `
          <tr>
            <td>${f.license}</td>
            <td>${f.name}</td>
            <td>${f.location}</td>
            <td>${complaintsForLicense(f.license).length}</td>
            <td>
              <button class="btn small secondary" data-license="${f.license}">
                View Complaints
              </button>
            </td>
          </tr>`
      ).join("");

      tableEl.addEventListener("click", (e) => {
        if (!e.target.dataset.license) return;
        const lic = e.target.dataset.license;
        const fbo = FBOS.find((f) => f.license === lic);
        const items = complaintsForLicense(lic);
        qs("#fboDetail").classList.remove("hidden");
        qs("#fboDetailTitle").textContent =
          `Complaints for ${fbo.name} (${fbo.license})`;
        qs("#fboDetailComplaints").innerHTML = items.length
          ? items.map(complaintCard).join("")
          : '<div class="card"><p class="muted">No complaints.</p></div>';
        qs("#fboDetail").scrollIntoView({ behavior: "smooth" });
      });

      qs("#closeFboDetail").addEventListener("click", () => {
        qs("#fboDetail").classList.add("hidden");
      });
    </script>
  </body>
</html>
