<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FSO Admin | Consumer Grievance Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="navbar"></div>

    <main class="container">
      <h1 class="page-title">Food Safety Officer — Admin Panel</h1>
      <p class="subtitle">
        Investigate consumer complaints, review registered Food Business
        Operators, and take regulatory action.
      </p>

      <div class="tabs">
        <button class="tab active" data-tab="complaints">
          <span id="tabIc1"></span> Complaints
        </button>
        <button class="tab" data-tab="fbo">
          <span id="tabIc2"></span> FBO Database
        </button>
      </div>

      <!-- Complaints tab -->
      <section id="tab-complaints">
        <div class="filter-row">
          <button class="filter active" data-filter="all">All</button>
          <button class="filter" data-filter="Pending">Pending</button>
          <button class="filter" data-filter="Under Review">
            Under Review
          </button>
          <button class="filter" data-filter="Action Taken">
            Action Taken
          </button>
        </div>

        <div id="complaintsList"></div>
      </section>

      <!-- FBO tab -->
      <section id="tab-fbo" class="hidden">
        <h2 class="section-heading">
          <span id="buildingIcon"></span>
          Registered Food Businesses
        </h2>
        <table class="table">
          <thead>
            <tr>
              <th>License #</th>
              <th>Name</th>
              <th>Location</th>
              <th>Complaints</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="fboTable"></tbody>
        </table>

        <section id="fboDetail" class="hidden" style="margin-top: 24px">
          <h3 id="fboDetailTitle" class="section-heading"></h3>
          <div id="fboDetailComplaints"></div>
          <button id="closeFboDetail" class="btn secondary small">Close</button>
        </section>
      </section>
    </main>

    <script src="/static/script.js"></script>
    <script>
      qs("#navbar").innerHTML = renderNavbar("complaints", "fso");
      qs("#tabIc1").innerHTML = Icons.clipboard;
      qs("#tabIc2").innerHTML = Icons.building;
      qs("#buildingIcon").innerHTML = Icons.building;

      const ALL_COMPLAINTS = [
        {
          id: "C001",
          restaurant: "Green Leaf Restaurant",
          license: "10012345000123",
          rating: 2.0,
          complaint: "Stale vegetables in salad.",
          consumer_name: "Rahul Sharma",
          consumer_phone: "+91-9876543210",
          status: "Under Review",
        },
        {
          id: "C003",
          restaurant: "Tandoor House",
          license: "10012345000789",
          rating: 1.6,
          complaint: "Dirty kitchen visible from window.",
          consumer_name: "Anita Verma",
          consumer_phone: "+91-9988776655",
          status: "Pending",
        },
        {
          id: "C005",
          restaurant: "South Express",
          license: "10012345001122",
          rating: 2.6,
          complaint: "Staff not wearing gloves.",
          consumer_name: "Karthik R.",
          consumer_phone: "+91-9090909090",
          status: "Pending",
        },
        {
          id: "C002",
          restaurant: "Spice Junction",
          license: "10012345000456",
          rating: 4.3,
          complaint: "Great hygiene, small billing issue.",
          consumer_name: "Meera Iyer",
          consumer_phone: "+91-9001122334",
          status: "Action Taken",
        },
      ];

      const FBOS = [
        { license: "10012345000123", name: "Green Leaf Restaurant", location: "Bengaluru" },
        { license: "10012345000456", name: "Spice Junction", location: "Kolkata" },
        { license: "10012345000789", name: "Tandoor House", location: "New Delhi" },
        { license: "10012345000991", name: "Coastal Catch", location: "Mumbai" },
        { license: "10012345001122", name: "South Express", location: "Chennai" },
      ];

      function complaintCard(c) {
        return `
          <div class="card" data-id="${c.id}">
            <div class="card-row">
              <div>
                <h3>${c.restaurant}</h3>
                <div class="meta">${icon("shield", "sm")} FSSAI: ${
                  c.license
                }</div>
                <div class="meta" style="margin-top: 4px">
                  ${icon("clipboard", "sm")} Complaint ID: ${c.id}
                </div>
              </div>
              <div style="text-align: right">
                <span class="rating-badge">
                  ${icon("star", "sm")} ${c.rating.toFixed(1)} / 5
                </span>
                <div style="margin-top: 8px">${statusChip(c.status)}</div>
              </div>
            </div>
            <p style="margin: 12px 0">${c.complaint}</p>
            <div class="muted" style="font-size: 13px; border-top: 1px dashed var(--border); padding-top: 10px">
              ${icon("user", "sm")} <strong>${c.consumer_name}</strong>
              &middot; ${icon("phone", "sm")} ${c.consumer_phone}
            </div>
            <div class="flex flex-wrap" style="margin-top: 12px; gap: 8px">
              <button class="btn small" data-action="warning">
                ${icon("alert", "sm")} Issue Warning
              </button>
              <button class="btn small navy" data-action="inspection">
                ${icon("search_doc", "sm")} Assign Inspection
              </button>
              <button class="btn small secondary" data-action="resolve">
                ${icon("check", "sm")} Mark Resolved
              </button>
            </div>
            <div class="action-slot"></div>
          </div>`;
      }

      const listEl = qs("#complaintsList");

      function renderComplaints(filter = "all") {
        const data =
          filter === "all"
            ? ALL_COMPLAINTS
            : ALL_COMPLAINTS.filter((c) => c.status === filter);
        if (!data.length) {
          listEl.innerHTML =
            '<div class="card"><p class="muted">No complaints for this filter.</p></div>';
          return;
        }
        listEl.innerHTML = data.map(complaintCard).join("");
      }
      renderComplaints();

      qsa(".filter-row .filter").forEach((b) => {
        b.addEventListener("click", () => {
          qsa(".filter-row .filter").forEach((x) =>
            x.classList.remove("active")
          );
          b.classList.add("active");
          renderComplaints(b.dataset.filter);
        });
      });

      listEl.addEventListener("click", (e) => {
        const card = e.target.closest(".card");
        if (!card) return;
        const btn = e.target.closest("[data-action]");
        if (!btn) return;

        const slot = card.querySelector(".action-slot");
        const id = card.dataset.id;
        const action = btn.dataset.action;
        const cls = {
          warning: "notice",
          inspection: "notice navy",
          resolve: "notice sage",
        }[action];
        const msg = {
          warning: `Warning issued to FBO for complaint ${id}.`,
          inspection: `Inspection assigned for complaint ${id}.`,
          resolve: `Complaint ${id} marked resolved.`,
        }[action];
        slot.innerHTML =
          `<div class="${cls}" style="margin-top: 10px">
             ${icon(
               action === "resolve"
                 ? "check"
                 : action === "inspection"
                 ? "search_doc"
                 : "alert",
               "sm"
             )} ${msg}
           </div>`;
      });

      // FBO table
      function complaintsForLicense(license) {
        return ALL_COMPLAINTS.filter((c) => c.license === license);
      }

      const tableEl = qs("#fboTable");
      tableEl.innerHTML = FBOS.map(
        (f) => `
          <tr>
            <td>${f.license}</td>
            <td>${f.name}</td>
            <td>${f.location}</td>
            <td>${complaintsForLicense(f.license).length}</td>
            <td>
              <button class="btn small secondary" data-license="${f.license}">
                View Complaints
              </button>
            </td>
          </tr>`
      ).join("");

      tableEl.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-license]");
        if (!btn) return;
        const lic = btn.dataset.license;
        const fbo = FBOS.find((f) => f.license === lic);
        const items = complaintsForLicense(lic);
        qs("#fboDetail").classList.remove("hidden");
        qs("#fboDetailTitle").innerHTML =
          `${icon("building")} Complaints for ${fbo.name} (${fbo.license})`;
        qs("#fboDetailComplaints").innerHTML = items.length
          ? items.map(complaintCard).join("")
          : '<div class="card"><p class="muted">No complaints.</p></div>';
        qs("#fboDetail").scrollIntoView({ behavior: "smooth" });
      });

      qs("#closeFboDetail").addEventListener("click", () => {
        qs("#fboDetail").classList.add("hidden");
      });

      // Tab switching
      qsa(".tabs .tab").forEach((t) => {
        t.addEventListener("click", () => {
          qsa(".tabs .tab").forEach((x) => x.classList.remove("active"));
          t.classList.add("active");
          const name = t.dataset.tab;
          qs("#tab-complaints").classList.toggle("hidden", name !== "complaints");
          qs("#tab-fbo").classList.toggle("hidden", name !== "fbo");
        });
      });

      // Deep link: #fbo
      if (location.hash === "#fbo") {
        qs('.tab[data-tab="fbo"]').click();
      }
    </script>
  </body>
</html>
