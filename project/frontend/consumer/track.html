<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Complaint | Consumer Grievance Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="navbar"></div>

    <main class="container">
      <h1 class="page-title">Complaint Status</h1>
      <p class="subtitle">
        Follow your complaint through its review lifecycle. You will be
        notified when the status changes.
      </p>

      <div class="card">
        <div class="card-row">
          <div class="flex" style="gap: 14px; align-items: flex-start">
            <span class="icon-circle lg" id="trkIconWrap"></span>
            <div>
              <h3 id="trkRestaurant">--</h3>
              <div class="meta">
                <span id="idIcon"></span> Complaint ID: <span id="trkId">--</span>
              </div>
              <div class="meta" style="margin-top: 4px">
                <span id="dateIcon"></span> Filed: <span id="trkDate">--</span>
              </div>
            </div>
          </div>
          <div style="text-align: right">
            <span class="rating-badge" id="trkRating"></span>
            <div style="margin-top: 8px" id="trkStatus"></div>
          </div>
        </div>

        <div class="kv-grid">
          <div class="kv">
            <span class="icon-circle" id="kv1"></span>
            <div>
              <div class="kv-label">Category</div>
              <div class="kv-value">Food Safety</div>
            </div>
          </div>
          <div class="kv">
            <span class="icon-circle sage" id="kv2"></span>
            <div>
              <div class="kv-label">Jurisdiction</div>
              <div class="kv-value">District FSO</div>
            </div>
          </div>
          <div class="kv">
            <span class="icon-circle amber" id="kv3"></span>
            <div>
              <div class="kv-label">Expected Action</div>
              <div class="kv-value">Within 7 days</div>
            </div>
          </div>
        </div>

        <hr class="divider-dashed" />
        <p class="muted" id="trkComment" style="margin-top: 8px"></p>

        <h4 class="section-heading" style="margin-top: 22px; font-size: 16px">
          <span id="timelineIcon"></span>
          Progress Tracker
        </h4>
        <div class="timeline" id="trkTimeline"></div>
      </div>

      <div class="flex flex-wrap" style="gap: 10px">
        <a href="dashboard.html" class="btn secondary">
          <span>←</span> Back to Dashboard
        </a>
        <button class="btn" id="contactOfficerBtn">
          <span>🏛</span> Find Handling Officer
        </button>
      </div>
    </main>

    <script src="/static/script.js"></script>
    <script>
      qs("#navbar").innerHTML = renderNavbar("home");
      qs("#idIcon").innerHTML = icon("document", "sm");
      qs("#dateIcon").innerHTML = icon("clock", "sm");
      qs("#timelineIcon").innerHTML = Icons.trending;
      qs("#kv1").innerHTML = Icons.shield;
      qs("#kv2").innerHTML = Icons.badge;
      qs("#kv3").innerHTML = Icons.stopwatch;

      qs("#contactOfficerBtn").addEventListener("click", openOfficerModal);

      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }

      const id = getParam("id");
      const user = Store.get("userComplaints", []);
      const all = [...user, ...MOCK_COMPLAINTS];
      const c = all.find((x) => x.id === id) || all[0];

      if (!c) {
        qs(".container").innerHTML =
          '<div class="card"><p class="muted">No complaint found.</p></div>';
      } else {
        qs("#trkRestaurant").textContent = c.restaurant;
        qs("#trkId").textContent = c.id;
        qs("#trkDate").textContent = c.date;
        qs("#trkRating").innerHTML =
          `${icon("star", "sm")} ${c.rating.toFixed(1)} / 5`;
        qs("#trkStatus").innerHTML = statusChip(c.status);
        qs("#trkComment").textContent = c.comment || "";

        const iconWrap = qs("#trkIconWrap");
        if (c.status === "Action Taken") {
          iconWrap.classList.add("sage");
          iconWrap.innerHTML = Icons.verified;
        } else if (c.status === "Under Review") {
          iconWrap.innerHTML = Icons.search_doc;
        } else {
          iconWrap.classList.add("amber");
          iconWrap.innerHTML = Icons.clock;
        }

        const stages = [
          { label: "Submitted", icon: Icons.upload, sub: "Filed by consumer" },
          { label: "Under Review", icon: Icons.search_doc, sub: "FSO investigating" },
          { label: "Action Taken", icon: Icons.verified, sub: "Resolved" },
        ];
        const reached = {
          Pending: 1,
          "Under Review": 2,
          "Action Taken": 3,
        }[c.status];

        qs("#trkTimeline").innerHTML = stages
          .map((s, idx) => {
            let state = "";
            if (idx < reached - 1) state = "done";
            else if (idx === reached - 1)
              state = c.status === "Action Taken" ? "done" : "current";
            const dotContent =
              state === "done"
                ? '<span style="font-weight:700">✓</span>'
                : state === "current"
                ? s.icon
                : idx + 1;
            return `
              <div class="timeline-step ${state}">
                <div class="dot">${dotContent}</div>
                <div class="label">${s.label}</div>
                <div class="sub-label">${s.sub}</div>
              </div>`;
          })
          .join("");
      }
    </script>
  </body>
</html>
