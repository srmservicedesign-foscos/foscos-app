<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Complaint | FoSCoS Grievance Portal</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="logo">F</span>
        <span>FoSCoS Grievance Portal</span>
      </div>
      <nav>
        <a href="dashboard.html">My Complaints</a>
      </nav>
    </header>

    <main class="container">
      <h1 class="page-title">Track Complaint</h1>

      <div class="card">
        <div class="card-row">
          <div>
            <h3 id="trkRestaurant">--</h3>
            <div class="meta">Complaint ID: <span id="trkId">--</span></div>
            <div class="meta">Filed: <span id="trkDate">--</span></div>
          </div>
          <div style="text-align:right">
            <div class="rating-badge" id="trkRating">-- / 5</div>
            <div style="margin-top:6px" id="trkStatus"></div>
          </div>
        </div>

        <p class="muted" id="trkComment" style="margin-top: 10px"></p>

        <h4 style="margin-top: 18px; color: var(--green-dark)">Timeline</h4>
        <div class="timeline" id="trkTimeline"></div>
      </div>

      <a href="dashboard.html" class="btn secondary">Back to Dashboard</a>
    </main>

    <script src="/static/script.js"></script>
    <script>
      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }

      const id = getParam("id");
      const user = Store.get("userComplaints", []);
      const all = [...user, ...MOCK_COMPLAINTS];
      const c = all.find((x) => x.id === id) || all[0];

      if (!c) {
        qs(".container").innerHTML =
          `<div class="card"><p class="muted">No complaint found.</p></div>`;
      } else {
        qs("#trkRestaurant").textContent = c.restaurant;
        qs("#trkId").textContent = c.id;
        qs("#trkDate").textContent = c.date;
        qs("#trkRating").textContent = `${c.rating.toFixed(1)} / 5`;
        qs("#trkStatus").innerHTML = statusChip(c.status);
        qs("#trkComment").textContent = c.comment || "";

        const stages = ["Submitted", "Under Review", "Action Taken"];
        const reached = {
          Pending: 1,
          "Under Review": 2,
          "Action Taken": 3,
        }[c.status];

        qs("#trkTimeline").innerHTML = stages
          .map(
            (s, idx) => `
            <div class="timeline-step ${idx < reached ? "done" : ""}">
              <div class="dot">${idx < reached ? "✓" : idx + 1}</div>
              <div class="label">${s}</div>
            </div>`
          )
          .join("");
      }
    </script>
  </body>
</html>
